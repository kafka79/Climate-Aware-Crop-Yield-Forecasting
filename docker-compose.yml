version: "3.9"

services:
  # === Streamlit Dashboard ===
  dashboard:
    build: .
    container_name: crop_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data          # Mount real data directory
      - ./models:/app/models      # Mount saved model checkpoints
      - ./configs:/app/configs    # Mount configs (NOT secrets in prod - use env vars)
    environment:
      # In production, set these as real env vars, not in docker-compose
      - SENTINELHUB_CLIENT_ID=${SENTINELHUB_CLIENT_ID}
      - SENTINELHUB_CLIENT_SECRET=${SENTINELHUB_CLIENT_SECRET}
      - UPAG_API_KEY=${UPAG_API_KEY}
      - ISRIC_API_KEY=${ISRIC_API_KEY}
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    restart: unless-stopped

  # === FastAPI Prediction Service ===
  api:
    build: .
    container_name: crop_api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./configs:/app/configs
    environment:
      - SENTINELHUB_CLIENT_ID=${SENTINELHUB_CLIENT_ID}
      - SENTINELHUB_CLIENT_SECRET=${SENTINELHUB_CLIENT_SECRET}
      - UPAG_API_KEY=${UPAG_API_KEY}
      - ISRIC_API_KEY=${ISRIC_API_KEY}
    command: uvicorn deployment.api.app:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  # === Training Pipeline Runner ===
  trainer:
    build: .
    container_name: crop_trainer
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./configs:/app/configs
    environment:
      - SENTINELHUB_CLIENT_ID=${SENTINELHUB_CLIENT_ID}
      - UPAG_API_KEY=${UPAG_API_KEY}
    command: >
      sh -c "python main.py --mode download &&
             python main.py --mode preprocess &&
             python main.py --mode train"
    profiles:
      - training  # Only runs when explicitly triggered: docker compose --profile training up trainer
    restart: "no"
